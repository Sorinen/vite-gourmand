services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vite_gourmand
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/data_initiales.sql:/docker-entrypoint-initdb.d/init.sql

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vite_gourmand
      MONGO_URL: mongodb://mongo:27017
      SECRET_KEY: change_this_in_production
    depends_on:
      - postgres
      - mongo
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data: